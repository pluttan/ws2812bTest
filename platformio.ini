; PlatformIO Project Configuration File
; WS2812B LED Strip Universal Test
;
; Используй Makefile для интерактивного выбора МК и пина

[env]
; Общие настройки для всех плат
lib_deps = 
    fastled/FastLED@^3.6.0
framework = arduino
monitor_speed = 115200
; Флаги сборки передаются через Makefile
build_flags = ${sysenv.BUILD_FLAGS}

; ==================== ESP32 ====================
[env:esp32]
platform = espressif32
board = esp32dev
; По умолчанию GPIO 5

; ==================== ESP32-C3 ====================
[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
; По умолчанию GPIO 8

; ==================== ESP32-S2 ====================
[env:esp32s2]
platform = espressif32
board = esp32-s2-saola-1
; По умолчанию GPIO 18

; ==================== ESP8266 ====================
[env:esp8266]
platform = espressif8266
board = nodemcuv2
; По умолчанию GPIO 5 (D1)

; ==================== Arduino Nano ====================
[env:nano]
platform = atmelavr
board = nanoatmega328
; По умолчанию пин 6

; ==================== Arduino Uno ====================
[env:uno]
platform = atmelavr
board = uno
; По умолчанию пин 6

; ==================== Arduino Mega ====================
[env:mega]
platform = atmelavr
board = megaatmega2560
; По умолчанию пин 6

; ==================== STM32 Blue Pill ====================
[env:bluepill]
platform = ststm32
board = bluepill_f103c8
upload_protocol = stlink
; По умолчанию PA7
